name: Deploy AI Assets to VPS

on:
  push:
    branches:
      - main
    paths:
      - "ai/**"
      - ".github/workflows/deploy-ai-assets.yml"
  workflow_dispatch:

concurrency:
  group: deploy-ai-assets
  cancel-in-progress: false

jobs:
  deploy-ai-assets:
    name: Deploy AI assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate skill files
        run: |
          set -euo pipefail
          python3 scripts/validate-skills.py

      - name: Upload AI assets to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          trap 'rm -f ~/.ssh/deploy_key' EXIT

          tar -cf - ai | ssh \
            -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=120 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            "$VPS_USER@$VPS_HOST" \
            'set -euo pipefail; mkdir -p /opt/apps; rm -rf /opt/apps/ai; tar -xf - -C /opt/apps'

      - name: Rebuild Ollama custom model
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/apps

            docker compose up -d ollama open-webui

            docker exec ollama test -f /opt/ai/modelfiles/panyakorn-glm-5.2.Modelfile
            docker exec ollama ollama create panyakorn-glm:latest \
              -f /opt/ai/modelfiles/panyakorn-glm-5.2.Modelfile

            docker exec ollama ollama list
            docker exec ollama curl -s http://127.0.0.1:11434/api/tags
